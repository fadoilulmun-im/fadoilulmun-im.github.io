<section class="section" id="experience" aria-labelledby="experience-heading">
  <div class="container">
    <div class="section__kicker">
      <span class="section__index" aria-hidden="true">03</span>
      <span class="rule" aria-hidden="true"></span>
      <p class="eyebrow" data-i18n="exp.eyebrow">Experience</p>
    </div>
    <h2 class="section__title reveal" id="experience-heading" data-i18n="exp.heading">
      Where I've worked
    </h2>

    <!-- Timeline generated from src/data/experience.js (see vite.config.js context).
         data-i18n keys (exp.<key>.role/period/location/desc/b1..bN) are generated
         from the same data in src/js/i18n.js, so the EN/ID toggle stays in sync. -->
    <ol class="timeline">
      {{#each experiences}}
      <li class="timeline__item">
        <article class="tcard reveal">
          <div class="tcard__aside">
            <p class="tcard__period" data-i18n="exp.{{key}}.period">{{period.en}}</p>
            <p class="tcard__location" data-i18n="exp.{{key}}.location">{{location.en}}</p>
          </div>
          <div class="tcard__main">
            <h3 class="tcard__role" data-i18n="exp.{{key}}.role">{{role.en}}</h3>
            <p class="tcard__company">{{company}}</p>
            <p class="tcard__desc" data-i18n="exp.{{key}}.desc">{{desc.en}}</p>
            <ul class="tcard__points">
              {{#each points}}
              <li data-i18n="exp.{{../key}}.b{{inc @index}}">{{this.en}}</li>
              {{/each}}
            </ul>
          </div>
        </article>
      </li>
      {{/each}}
    </ol>
  </div>
</section>
