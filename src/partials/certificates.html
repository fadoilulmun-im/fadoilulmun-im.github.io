<section class="section" id="certificates" aria-labelledby="certificates-heading">
  <div class="container">
    <div class="section__kicker">
      <span class="section__index" aria-hidden="true">05</span>
      <span class="rule" aria-hidden="true"></span>
      <p class="eyebrow" data-i18n="cert.eyebrow">Certificates</p>
    </div>
    <h2 class="section__title reveal" id="certificates-heading" data-i18n="cert.heading">
      Credentials
    </h2>

    <!-- Generated from src/data/certificates.js. Titles/issuers are proper nouns
         and are not translated, so these rows carry no data-i18n keys. -->
    <ul class="certs">
      {{#each certificates}}
      <li class="cert reveal">
        <a class="cert__link" href="{{url}}" target="_blank" rel="noopener noreferrer">
          <span class="cert__year">{{year}}</span>
          <span class="cert__body">
            <span class="cert__title">{{title}}</span>
            <span class="cert__issuer">{{issuer}}</span>
          </span>
          <svg class="cert__ext icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M14 4h6v6M20 4l-9 9M19 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6" />
          </svg>
        </a>
      </li>
      {{/each}}
    </ul>
  </div>
</section>
