<section class="hero" id="hero" aria-labelledby="hero-name">
  <div
    class="container hero__inner reveal relative grid gap-8 min-[880px]:grid-cols-[1fr_auto] min-[880px]:items-center min-[880px]:gap-14">
    <div class="hero__content">
      <p class="eyebrow" data-i18n="hero.eyebrow">Fullstack Developer</p>
      <h1 class="hero__name mt-3 text-3xl font-extrabold tracking-[-0.035em]" id="hero-name">Fadoilul Mun'im</h1>
      <p class="hero__title mt-3 text-xl font-semibold text-text-muted" data-i18n="hero.title">Fullstack PHP Laravel
        Programmer</p>
      <p class="hero__intro mt-6 max-w-[60ch] text-lg text-text-muted" data-i18n="hero.intro">
        I build reliable web applications and RESTful APIs — with 4+ years of fullstack
        experience and a backend rooted in PHP and Laravel.
      </p>

      <ul class="hero__meta mt-6 flex flex-wrap gap-x-6 gap-y-3" aria-label="Quick facts">
        <li class="hero__meta-item">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 21s-7-5.2-7-11a7 7 0 0 1 14 0c0 5.8-7 11-7 11Z" />
            <circle cx="12" cy="10" r="2.6" />
          </svg>
          <span data-i18n="hero.location">Surabaya, Indonesia</span>
        </li>
        <!-- <li class="hero__meta-item hero__badge">
          <span class="dot" aria-hidden="true"></span>
          <span data-i18n="hero.availability">Available for remote work</span>
        </li> -->
      </ul>

      <div class="hero__cta mt-8 flex flex-wrap gap-3">
        <a class="btn btn--primary" href="#projects" data-i18n="hero.cta.work">View Work</a>
        <a class="btn btn--outline" href="/Fadoilul-Munim-CV.pdf" download data-i18n="hero.cta.cv">Download CV</a>
        <a class="btn btn--ghost" href="#contact" data-i18n="hero.cta.contact">Get in Touch</a>
      </div>
    </div>

    <div
      class="hero__media order-first justify-self-center min-[880px]:order-0 min-[880px]:justify-self-end">
      <figure class="hero__avatar">
        <img class="hero__avatar-img" src="/my-photo-avatar.webp"
          alt="Portrait of Fadoilul Mun'im, Fullstack Developer" data-i18n-attr="alt:hero.photoAlt" width="256"
          height="256" loading="eager" decoding="async" fetchpriority="high" />
      </figure>
    </div>
  </div>
