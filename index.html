<!doctype html>
<!--
  Fadoilul Mun'im — Personal Portfolio
  Vanilla JS + Tailwind CSS v4, bundled with Vite.
  Content source of truth: "Fadoilul Munim - CV.md"
  Edit visible copy in two places:
    1. The English text below (the default first paint), and
    2. The matching key in the I18N object in src/js/i18n.js (EN + ID).
  Both must stay in sync — see README.md > "Editing content & translations".
  (Projects & experience are data-driven from src/data/*.js — edit the record there.)
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================ SEO ============================ -->
    <title>Fadoilul Mun'im — Fullstack PHP &amp; Laravel Programmer</title>
    <meta
      name="description"
      content="Fadoilul Mun'im — Fullstack PHP/Laravel programmer based in Surabaya, Indonesia. 4+ years building RESTful APIs, ERP, and web apps with Laravel, React, and more."
    />
    <meta name="author" content="Fadoilul Mun'im" />
    <meta
      name="keywords"
      content="Fadoilul Mun'im, Fullstack Developer, Laravel, PHP, React, Backend Developer, Surabaya, Indonesia"
    />
    <link rel="canonical" href="https://fadoilulmun-im.github.io/" />

    <!-- ===================== Open Graph / Twitter ===================== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fadoilul Mun'im — Fullstack PHP &amp; Laravel Programmer" />
    <meta
      property="og:description"
      content="Fullstack PHP/Laravel programmer based in Surabaya, Indonesia. 4+ years of building APIs and web apps."
    />
    <meta property="og:url" content="https://fadoilulmun-im.github.io/" />
    <meta property="og:image" content="https://fadoilulmun-im.github.io/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="id_ID" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fadoilul Mun'im — Fullstack PHP &amp; Laravel Programmer" />
    <meta
      name="twitter:description"
      content="Fullstack PHP/Laravel programmer based in Surabaya, Indonesia."
    />
    <meta name="twitter:image" content="https://fadoilulmun-im.github.io/assets/og-image.png" />

    <!-- theme-color: one per scheme so the browser chrome matches the active theme -->
    <meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />

    <!-- Inline SVG favicon (an "FM" mark) — works over file:// with no extra request -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='3'%20fill='%23141414'/%3E%3Ctext%20x='32'%20y='44'%20font-family='ui-monospace,Menlo,Consolas,monospace'%20font-size='28'%20font-weight='600'%20fill='%23f5f5f3'%20text-anchor='middle'%3EFM%3C/text%3E%3C/svg%3E"
    />

    <!-- Fonts are self-hosted via Fontsource and bundled through src/style.css —
       no third-party request, offline-capable. -->

    <!--
    FOUC-prevention: set theme + lang on <html> BEFORE the stylesheet paints.
    Precedence: explicit stored choice > prefers-color-scheme. Wrapped in try/catch
    for file:// / private-mode where localStorage may throw.
  -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
          var l = localStorage.getItem("lang");
          document.documentElement.setAttribute("lang", l === "id" ? "id" : "en");
        } catch (e) {
          /* no-op */
        }
        // Mark JS as available so progressive-enhancement styles (e.g. scroll reveal) can engage.
        document.documentElement.classList.add("js");
      })();
    </script>

    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body>
    <!-- Skip link for keyboard users -->
    <a class="skip-link" href="#main" data-i18n="a11y.skip">Skip to content</a>

    {{> navbar }}

    <main id="main">
      {{> hero }} {{> about }} {{> skills }} {{> experience }} {{> projects }} {{> certificates }}
      {{> education }} {{> contact }}
    </main>

    {{> footer }}

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
